name: publish-release

on:
  push:
    tags:
      - "v*"
      - "v*-rc*"
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Choose publish target"
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Quality gates
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,cli,crypto,engines]
          ruff check src tests
          mypy src/pii_anon
          pytest -m "not performance"
          pytest -m performance --no-cov
      - name: Build and validate package
        run: |
          python -m build --outdir dist
          python scripts/check_package_size.py --dist-dir dist --max-wheel-mb 1.5 --package-name pii_anon
          twine check dist/*
      - name: CLI smoke test
        run: |
          pii-anon version
          pii-anon capabilities --output json
      - uses: actions/upload-artifact@v4
        with:
          name: python-packages
          path: dist/*

  publish-testpypi:
    if: github.event_name == 'push' && contains(github.ref_name, '-rc')
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-packages
          path: dist/
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

  publish-pypi:
    if: github.event_name == 'push' && startsWith(github.ref_name, 'v') && !contains(github.ref_name, '-rc')
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-packages
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  publish-testpypi-manual:
    if: github.event_name == 'workflow_dispatch' && inputs.target_environment == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-packages
          path: dist/
      - name: Manual dispatch safety checks
        run: |
          echo "target_environment=${{ inputs.target_environment }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.ref_name=${{ github.ref_name }}"
          ls -la dist
          test -n "$(ls -A dist 2>/dev/null)" || { echo "dist/ artifact is empty"; exit 1; }
      - name: Publish to TestPyPI (manual)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}

  publish-pypi-manual:
    if: github.event_name == 'workflow_dispatch' && inputs.target_environment == 'pypi'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-packages
          path: dist/
      - name: Manual dispatch safety checks
        run: |
          echo "target_environment=${{ inputs.target_environment }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.ref_name=${{ github.ref_name }}"
          ls -la dist
          test -n "$(ls -A dist 2>/dev/null)" || { echo "dist/ artifact is empty"; exit 1; }
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "Manual PyPI publish requires a version tag ref starting with refs/tags/v."
            exit 1
          fi
      - name: Publish to PyPI (manual)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
